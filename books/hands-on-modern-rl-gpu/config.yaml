title: "AWS GPU で動かす Hands-On Modern RL"
summary: "walkinglabs/hands-on-modern-rl (CartPole から VLM RL までの 14 章) を AWS の最新 GPU インスタンス (g7e.2xlarge / NVIDIA RTX PRO 6000 Blackwell 96GB) 上で動かすための実機検証済みハンズオン。CDK ベースの環境構築、SSM 経由の Task Runner、章ごとの venv セットアップから訓練スクリプト実行まで、つまずきポイントを網羅した日本語ガイド。

